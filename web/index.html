<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bevy Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: #ffffff;
        }
        .games {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        a.card {
            display: block;
            padding: 2rem 3rem;
            background: #1a1a3e;
            border: 1px solid #333366;
            border-radius: 12px;
            text-decoration: none;
            color: #e0e0e0;
            transition: transform 0.15s, border-color 0.15s;
        }
        a.card:hover {
            transform: translateY(-4px);
            border-color: #6666cc;
        }
        a.card h2 { color: #9999ff; margin-bottom: 0.5rem; }
        a.card p { color: #999; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>Bevy Games</h1>
    <div class="games">
        <a class="card" href="./bevy-asteroids/">
            <h2>Asteroids</h2>
            <p>3D inertial asteroids with Bevy 0.15</p>
        </a>
        <a class="card" href="./bevy-space-rts/">
            <h2>Space RTS</h2>
            <p>Top-down space RTS with Bevy 0.18</p>
        </a>
    </div>
</body>
</html>
