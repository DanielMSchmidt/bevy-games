name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Fetch bevy-space-rts assets
        run: |
          cd bevy-space-rts
          chmod +x scripts/fetch_assets.sh
          ./scripts/fetch_assets.sh

      - name: Build bevy-asteroids
        run: |
          cd bevy-asteroids
          trunk build --release --public-url /bevy-games/bevy-asteroids/

      - name: Build bevy-space-rts
        run: |
          cd bevy-space-rts
          trunk build --release --public-url /bevy-games/bevy-space-rts/

      - name: Assemble site
        run: |
          mkdir -p _site
          cp web/index.html _site/
          cp -r bevy-asteroids/dist _site/bevy-asteroids
          cp -r bevy-space-rts/dist _site/bevy-space-rts

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
